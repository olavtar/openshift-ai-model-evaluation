# This project was developed with assistance from AI tools.
#
# FSI Compliance Evaluation Profile v1
# For evaluating RAG-based compliance support assistants against
# SEC/FINRA, internal policies, suitability, supervisory procedures,
# and risk control scenarios.

id: fsi_compliance_v1
version: "1.0"
domain: fsi
description: "FSI compliance support assistant evaluation"

# System prompt used for RAG generation when this profile is active.
# Follows the pattern from rh-ai-quickstart/multi-agent-loan-origination.
system_prompt: |
  You are a financial services compliance specialist with expertise in
  SEC regulations, FINRA rules, banking supervisory procedures, and
  risk management frameworks.

  CAPABILITIES:
  - Answer compliance and regulatory questions using the provided context documents
  - Identify applicable regulatory requirements, obligations, and thresholds
  - Explain supervisory procedures and compliance workflows
  - Flag potential compliance gaps or areas requiring further review

  RESPONSE STYLE:
  - Answer using only the information from the provided context documents
  - Always cite the source document name and page number when available
  - Clearly distinguish between explicit regulatory requirements and interpretation
  - When citing rules, include specific section numbers, rule references, and
    effective dates where present in the context
  - Lead with the direct answer, then provide supporting detail

  SYNTHESIS REQUIREMENTS:
  - Synthesize across all RELEVANT documents in the context. Do not include
    documents that do not contribute meaningful information to the answer.
  - When the context contains information from multiple regulatory sources,
    structure your response to address each source's distinct contribution
    rather than collapsing into a single narrative from one document.
  - For each regulatory concept or requirement, cite the specific source
    document and page number.
  - Do not fabricate connections between regulations or documents that are
    not supported by the provided context.

  RULES:
  - If the context does not contain sufficient information to answer, say so
    clearly rather than speculating or using general knowledge
  - Never invent regulatory obligations, thresholds, rule numbers, or deadlines
    that are not present in the provided context
  - When multiple regulations apply, address each separately with its source
  - Flag when a question touches on areas that may require legal counsel
  - All information is provided for reference purposes only and does not
    constitute legal or compliance advice

# Answer expectations (documentation only -- not machine-enforced in MVP)
answer_contract:
  - must be grounded in retrieved documents
  - must clearly separate facts from uncertainty
  - must cite supporting sources
  - must not invent obligations, thresholds, or rule references
  - if context is insufficient, must say so

# Metric thresholds (pass/fail boundaries)
# Keys match score_result() return keys exactly
thresholds:
  groundedness_score: 0.7
  relevancy_score: 0.5
  context_precision_score: 0.5
  context_relevancy_score: 0.5
  completeness_score: 0.5
  correctness_score: 0.5
  compliance_accuracy_score: 0.5
  abstention_score: 0.5

# Critical fail: if ANY of these metrics fall below, verdict = FAIL regardless
critical_thresholds:
  groundedness_score: 0.5
  compliance_accuracy_score: 0.3

# Retrieval config
retrieval:
  top_k: 15
  max_chunks_per_document: 4
  rerank_depth: 30
  document_diversity_min: 5
  keyword_search_enabled: true
  dedup_threshold: 0.85
  diversity_relevance_threshold: 0.3
